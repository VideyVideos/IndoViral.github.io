<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:#fff;
}

/* HEADER */
.header {
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* VIDEO */
.video-container {
  width:100%;
  max-width:500px;
  margin:auto;
}

video {
  width:100%;
  border-radius:10px;
}

/* INFO */
.info {
  padding:15px;
}

.title {
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.views {
  color:#aaa;
  font-size:14px;
}

/* BUTTON */
.btn {
  display:block;
  width:90%;
  margin:20px auto;
  padding:15px;
  text-align:center;
  background:#ff0000;
  border-radius:10px;
  color:#fff;
  font-size:18px;
  text-decoration:none;
}
</style>

</head>
<body>

<div class="header">videy</div>

<div class="video-container">
  <video id="vid" controls>
    <source src="https://cdn.videy.co/Fmm16v9f1.mp4" type="video/mp4">
  </video>
</div>

<div class="info">
  <div class="title">Video ini bikin shock 😱</div>
  <div class="views">1.2M views • baru saja</div>
</div>

<a href="#" class="btn" onclick="goLink()">Watch Now</a>

<!-- VIGNETTE -->
<script>
(function(s){
s.dataset.zone='10829884',
s.src='https://n6wxm.com/vignette.min.js'
})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

<!-- POPUNDER -->
<script>
(function(s){
s.dataset.zone='10829867',
s.src='https://al5sm.com/tag.min.js'
})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

<script>
// DIRECT LINK
function goLink(){
  window.location.href = "https://omg10.com/4/10829870";
}

// AUTO REDIRECT SAAT PLAY
document.getElementById("vid").addEventListener("play", function(){
  setTimeout(() => {
    window.location.href = "https://omg10.com/4/10829870";
  }, 3000);
});

// TRIGGER TAMBAHAN (SCROLL)
window.addEventListener('scroll', function(){
  let s = document.createElement('script');
  s.src = 'https://al5sm.com/tag.min.js';
  s.dataset.zone = '10829867';
  document.body.appendChild(s);
});
</script>

</body>
  </html>
